name: Build Windows exe

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: 'win64_msvc2022_64'
          modules: ''

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt dependencies
        run: |
          $exe = Get-ChildItem -Path build -Filter "YtDlpGui.exe" -Recurse | Select-Object -First 1
          & "${{ env.Qt6_DIR }}\bin\windeployqt.exe" $exe.FullName

      - name: Package
        run: |
          $exe = Get-ChildItem -Path build -Filter "YtDlpGui.exe" -Recurse | Select-Object -First 1
          $dest = "dist"
          New-Item -ItemType Directory -Path $dest -Force
          Copy-Item -Path $exe.DirectoryName\* -Destination $dest -Recurse -Force
          Compress-Archive -Path "$dest\*" -DestinationPath "YtDlpGui-windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: YtDlpGui-windows
          path: YtDlpGui-windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: YtDlpGui-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
